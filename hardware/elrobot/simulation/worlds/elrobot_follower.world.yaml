world_name: elrobot_follower_empty
urdf_source: ../elrobot_follower.urdf
mjcf_output: ./elrobot_follower.xml

scene:
  timestep: 0.002
  gravity: [0, 0, -9.81]
  integrator: RK4
  solver: Newton
  iterations: 50

scene_extras:
  lights:
    - name: default_top
      pos: [0, 0, 3]
      dir: [0, 0, -1]
  floor:
    size: [2, 2, 0.1]
    material: grid

robots:
  - robot_id: elrobot_follower

    # Note: for REVOLUTE_POSITION actuators, limits (limit_min/limit_max/
    # effort_limit/velocity_limit) are intentionally OMITTED from the manifest.
    # The URDF is the source of truth for revolute limits; gen.py copies them
    # into the generated MJCF's <position ctrlrange="...">, and the runtime
    # (Chunk 5's norma_sim.world.descriptor) reads them from the MJCF at load
    # time. Only GRIPPER_PARALLEL capability declares limits in the manifest
    # because its normalized 0..1 range is not present in URDF or MJCF.
    actuators:
      - actuator_id: rev_motor_01
        display_name: "Shoulder Pitch"
        urdf_joint: rev_motor_01
        mjcf_actuator: act_motor_01
        capability: {kind: REVOLUTE_POSITION}
        actuator_gains: {kp: 15.0, kv: 0.5}

      - actuator_id: rev_motor_02
        display_name: "Shoulder Roll"
        urdf_joint: rev_motor_02
        mjcf_actuator: act_motor_02
        capability: {kind: REVOLUTE_POSITION}
        actuator_gains: {kp: 15.0, kv: 0.5}

      - actuator_id: rev_motor_03
        display_name: "Shoulder Yaw"
        urdf_joint: rev_motor_03
        mjcf_actuator: act_motor_03
        capability: {kind: REVOLUTE_POSITION}
        actuator_gains: {kp: 15.0, kv: 0.5}

      - actuator_id: rev_motor_04
        display_name: "Elbow"
        urdf_joint: rev_motor_04
        mjcf_actuator: act_motor_04
        capability: {kind: REVOLUTE_POSITION}
        actuator_gains: {kp: 15.0, kv: 0.5}

      - actuator_id: rev_motor_05
        display_name: "Wrist Roll"
        urdf_joint: rev_motor_05
        mjcf_actuator: act_motor_05
        capability: {kind: REVOLUTE_POSITION}
        actuator_gains: {kp: 15.0, kv: 0.5}

      - actuator_id: rev_motor_06
        display_name: "Wrist Pitch"
        urdf_joint: rev_motor_06
        mjcf_actuator: act_motor_06
        capability: {kind: REVOLUTE_POSITION}
        actuator_gains: {kp: 15.0, kv: 0.5}

      - actuator_id: rev_motor_07
        display_name: "Wrist Yaw"
        urdf_joint: rev_motor_07
        mjcf_actuator: act_motor_07
        capability: {kind: REVOLUTE_POSITION}
        actuator_gains: {kp: 15.0, kv: 0.5}

      - actuator_id: rev_motor_08
        display_name: "Gripper"
        urdf_joint: rev_motor_08
        mjcf_actuator: act_motor_08
        capability:
          kind: GRIPPER_PARALLEL
          limit_min: 0.0
          limit_max: 1.0
          effort_limit: 2.94
          velocity_limit: 4.71
        actuator_gains: {kp: 10.0, kv: 0.3}
        gripper:
          primary_joint_range_rad: [0.0, 2.2028]
          normalized_range: [0.0, 1.0]
          mimic_joints:
            - {joint: rev_motor_08_1, multiplier: -0.0115}
            - {joint: rev_motor_08_2, multiplier: 0.0115}

    sensors:
      - sensor_id: joint_state_all
        display_name: "All joint states"
        capability: {kind: JOINT_STATE}
        source: all_actuators
