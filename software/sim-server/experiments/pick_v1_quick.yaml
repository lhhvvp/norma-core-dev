robot:
  manifest: hardware/elrobot/simulation/manifests/norma/therobotstudio_so101_tabletop.scene.yaml

sim:
  backend: fast
  physics_hz: 500
  action_hz: 30
  gl_env:
    DISPLAY: ":0"
    GALLIUM_DRIVER: d3d12
    MUJOCO_GL: glx

cameras:
  top: [224, 224]

task:
  name: pick_and_place
  episodes: 5
  action_noise: 0.02
  seed: 0

dataset:
  repo_id: norma/sim_pick_v1_quick
  root: datasets/norma_sim_pick_v1_quick
  use_videos: false

training:
  policy: act
  batch_size: 8
  steps: 500
  save_freq: 250
  log_freq: 100
  num_workers: 2
  output_dir: outputs/act_pick_v1_quick
