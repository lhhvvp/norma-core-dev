syntax = "proto3";

package frame;

message FramesPack {
    FrameFormat format = 1;

    repeated FrameStamp stamps = 10;
    bytes linear_data = 11; // if frames are equal-size, like NCHW
    repeated bytes frames_data = 12;
}

message FrameStamp {
    uint64 monotonic_stamp_ns = 1;
    uint64 local_stamp_ns     = 2;
    uint64 app_start_id       = 3;
    uint64 index              = 4;
}

enum FrameFormatKind {
    FF_NCHW = 0; // 1-byte u8, all Red channel come first, then all Green, then all Blue
    FF_JPEG = 1;
}

message FrameFormat {
    uint32 width  = 1;
    uint32 height = 2;

    FrameFormatKind kind = 10;
}